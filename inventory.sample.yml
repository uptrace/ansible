uptrace:
  hosts:
    10.10.1.1: { primary: true }

postgresql:
  hosts:
    # primary
    10.10.1.1:
    # standbys
    #10.10.1.2: { pg_primary_host: 10.10.1.1 }
    #10.10.1.3: { pg_primary_host: 10.10.1.1 }

clickhouse:
  children:
    clickhouse_server:
    clickhouse_keeper:

clickhouse_server:
  hosts:
    10.10.1.1:
      ch_cluster: uptrace1
      ch_shard: shard1
      ch_replica: replica1
    #10.10.1.2:
    #  ch_cluster: uptrace1
    #  ch_shard: shard1
    #  ch_replica: replica2

    #10.10.1.3:
    #  ch_cluster: uptrace1
    #  ch_shard: shard2
    #  ch_replica: replica1
    #10.10.1.4:
    #  ch_cluster: uptrace1
    #  ch_shard: shard2
    #  ch_replica: replica2

clickhouse_keeper:
  hosts:
    10.10.1.1: { keeper_id: 1 }
    #10.10.1.2: { keeper_id: 2 }

redis:
  children:
    redis_cache:

redis_cache:
  hosts:
    10.10.1.1: { redis_port: 6379, redis_node_id: alpha, redis_maxmemory_mb: 128 }
    #10.10.1.2: { redis_port: 6379, redis_node_id: bravo, redis_maxmemory_mb: 128 }
    #10.10.1.3: { redis_port: 6379, redis_node_id: charlie, redis_maxmemory_mb: 128 }

# Single-node KRaft broker; otelcol auto-scrapes any host in this group on :9092.
# Adding a host here also enables the Uptrace worker process and the ClickHouse
# Kafka engine (brokers are read from this group on :9092 in config.yml).
