# KRaft mode: this node acts as both broker and controller
process.roles=broker,controller
node.id={{ kafka_node_id }}
controller.quorum.voters={{ kafka_node_id }}@{{ inventory_hostname }}:{{ kafka_controller_port }}

# Network listeners and security protocols
listeners=PLAINTEXT://:{{ kafka_port }},CONTROLLER://:{{ kafka_controller_port }}
advertised.listeners=PLAINTEXT://{{ inventory_hostname }}:{{ kafka_port }}
controller.listener.names=CONTROLLER
inter.broker.listener.name=PLAINTEXT
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

# Thread pools and socket buffers
num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600
# Max size of a single message (10 MB) and matching replica fetch size
message.max.bytes={{ kafka_max_message_bytes }}
replica.fetch.max.bytes={{ kafka_max_message_bytes }}

# Log storage and default partitioning
log.dirs={{ kafka_data_dir }}
num.partitions=3
num.recovery.threads.per.data.dir=1

# Topic creation and replication factors (single-node defaults)
# Allow clients (Uptrace, ClickHouse Kafka engine) to create topics on first use
auto.create.topics.enable=true
default.replication.factor=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

# Log retention: keep data for 7 days
log.retention.hours=168
log.retention.check.interval.ms=300000
